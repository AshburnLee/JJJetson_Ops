# Ruff reads this file without requiring an installable package.
# Optional: pip install "pre-commit>=3" "ruff>=0.8"

[tool.ruff]
target-version = "py312"
line-length = 100
src = ["tests"]

[tool.ruff.lint]
select = [
  "E",
  "F",
  "I",
  "W",
  "UP",
]
ignore = [
  "E501",
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = [
  "E402",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
